name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audits:
    name: Spec audits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # .pdeq provides the audit scripts
          fetch-depth: 0        # traceability grace-period reads git history
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Traceability audit (strict)
        run: ./scripts/audit-traceability.sh --check
      - name: Lane-discipline lexical backstop
        run: ./scripts/audit-lanes.sh
      - name: Lane-discipline blocking structural check
        run: ./scripts/audit-structure.sh

  app:
    name: Build + test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: swift build
        working-directory: engineering/apps/macos
      - name: Test
        run: swift test
        working-directory: engineering/apps/macos
